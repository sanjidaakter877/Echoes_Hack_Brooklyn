<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer ring pulse -->
  <circle cx="16" cy="16" r="13" stroke="#c8a96e" stroke-width="1.2" opacity="0.35"/>
  <!-- Middle ring -->
  <circle cx="16" cy="16" r="9" stroke="#c8a96e" stroke-width="1" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3.5" fill="#c8a96e"/>
  <!-- Subtle radiating lines (cardinal) -->
  <line x1="16" y1="2" x2="16" y2="5.5" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="26.5" x2="16" y2="30" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="2" y1="16" x2="5.5" y2="16" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="26.5" y1="16" x2="30" y2="16" stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
